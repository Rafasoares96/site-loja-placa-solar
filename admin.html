  <div class="container">
    <h1>Painel Serviços RJMax</h1>

    <div class="card">

      <input type="file" id="service-image" accept="image/*">
      <input type="text" id="service-title" placeholder="Título do serviço">
      <textarea id="service-summary" placeholder="Resumo curto"></textarea>
      <textarea id="service-details" placeholder="Texto completo do Ver mais"></textarea>
      <input type="number" id="service-order" placeholder="Ordem (1, 2, 3...)">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      deleteDoc,
      doc,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSOqRV3vcnzF-mIMHOTrffF7oO0UFH5rE",
      authDomain: "site-placa-solar.firebaseapp.com",
      projectId: "SEU_PROJECT_Isite-placa-solar",
      storageBucket: "site-placa-solar.firebasestorage.app",
      messagingSenderId: "256591690469",
      appId: "1:256591690469:web:2fc7eb789cbe3c6ba1b20c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const cloudName = "dnfjpphhk";
    const uploadPreset = "site_rjmax";

    async function uploadImage(file) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", uploadPreset);

      const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      if (!data.secure_url) throw new Error("Falha no upload");
      return data.secure_url;
    }

    async function carregarServicosAdmin() {
      const list = document.getElementById("services-admin-list");
      list.innerHTML = "Carregando...";

      const q = query(collection(db, "services"), orderBy("ordem", "asc"));
      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        list.innerHTML = "<p>Nenhum serviço cadastrado ainda.</p>";
        return;
      }

      list.innerHTML = "";

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        list.innerHTML += `
          <div class="item">
            <img src="${data.imagem}" alt="${data.titulo}">
            <div class="content">
              <h3>${data.titulo || ""}</h3>
              <p>${data.resumo || ""}</p>
              <p><strong>Ordem:</strong> ${data.ordem || 0}</p>
              <button class="delete" data-id="${docSnap.id}">Excluir</button>
            </div>
          </div>
        `;
      });

      document.querySelectorAll(".delete").forEach((btn) => {
        btn.onclick = async () => {
          if (!confirm("Deseja excluir este serviço?")) return;
          await deleteDoc(doc(db, "services", btn.dataset.id));
          carregarServicosAdmin();
        };
      });
    }

    document.getElementById("save-service").addEventListener("click", async () => {
      const msg = document.getElementById("service-msg");
      const file = document.getElementById("service-image").files[0];
      const titulo = document.getElementById("service-title").value.trim();
      const resumo = document.getElementById("service-summary").value.trim();
      const detalhes = document.getElementById("service-details").value.trim();
      const ordem = Number(document.getElementById("service-order").value || 0);

      if (!file || !titulo) {
        msg.style.color = "red";
        msg.textContent = "Selecione imagem e título.";
        return;
      }

      try {
        msg.style.color = "#333";
        msg.textContent = "Enviando imagem...";

        const imagem = await uploadImage(file);

        await addDoc(collection(db, "services"), {
          titulo,
          resumo,
          detalhes,
          imagem,
          ordem,
          createdAt: serverTimestamp()
        });

        msg.style.color = "green";
        msg.textContent = "Serviço salvo com sucesso.";

        document.getElementById("service-image").value = "";
        document.getElementById("service-title").value = "";
        document.getElementById("service-summary").value = "";
        document.getElementById("service-details").value = "";
        document.getElementById("service-order").value = "";

        carregarServicosAdmin();
      } catch (error) {
        console.error(error);
        msg.style.color = "red";
        msg.textContent = "Erro ao salvar serviço.";
      }
    });

    carregarServicosAdmin();
  </script>
</body>
