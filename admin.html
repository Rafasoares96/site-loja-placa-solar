<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Serviços RJMax</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,.08);
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      background: #0d6efd;
      color: #fff;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      opacity: .95;
    }

    .msg {
      margin-top: 12px;
      font-weight: bold;
      white-space: pre-wrap;
    }

    .erro {
      color: #c62828;
    }

    .ok {
      color: #2e7d32;
    }

    .item {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #eee;
      margin-bottom: 16px;
    }

    .item img {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      display: block;
    }

    .item .content {
      padding: 14px;
    }

    .loading {
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Painel de Serviços</h1>
      <p>Adicione novos serviços sem alterar o código do site.</p>

      <input type="file" id="service-image" accept="image/*">
      <input type="text" id="service-title" placeholder="Título do serviço">
      <textarea id="service-summary" placeholder="Resumo curto que aparece no card"></textarea>
      <textarea id="service-details" placeholder="Texto completo do Ver mais"></textarea>

      <button id="save-service">Publicar serviço</button>

      <div id="service-msg" class="msg"></div>
    </div>

    <div class="card">
      <h2>Serviços adicionados pelo painel</h2>
      <div id="services-admin-list" class="loading">Carregando...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      orderBy,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDSOqRV3vcnzF-mIMHOTrffF7oO0UFH5rE",
      authDomain: "site-placa-solar.firebaseapp.com",
      projectId: "site-placa-solar",
      storageBucket: "site-placa-solar.firebasestorage.app",
      messagingSenderId: "256591690469",
      appId: "1:256591690469:web:2fc7eb789cbe3c6ba1b20c"
    };
console.log(firebaseConfig);

if (!firebaseConfig.apiKey || !firebaseConfig.apiKey.startsWith("AIza")) {
  throw new Error("A apiKey do Firebase está errada ou não foi colada.");
}

    const cloudName = "dnfjpphhk";
    const uploadPreset = "site_rjmax";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const msg = document.getElementById("service-msg");
    const list = document.getElementById("services-admin-list");
    const btn = document.getElementById("save-service");

    function showMessage(text, type = "ok") {
      msg.className = `msg ${type}`;
      msg.textContent = text;
    }

    async function uploadImage(file) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", uploadPreset);

      const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      console.log("Cloudinary:", data);

      if (!res.ok) {
        throw new Error(data?.error?.message || "Falha no upload da imagem.");
      }

      if (!data.secure_url) {
        throw new Error("A imagem não retornou URL.");
      }

      return data.secure_url;
    }

    async function carregarServicosAdmin() {
      try {
        const q = query(collection(db, "services"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          list.innerHTML = "<p>Nenhum serviço enviado ainda.</p>";
          return;
        }

        list.innerHTML = "";

        snapshot.forEach((docSnap) => {
          const data = docSnap.data();

          list.innerHTML += `
            <div class="item">
              <img src="${data.imagem || ""}" alt="${data.titulo || ""}">
              <div class="content">
                <h3>${data.titulo || ""}</h3>
                <p>${data.resumo || ""}</p>
              </div>
            </div>
          `;
        });
      } catch (error) {
        console.error(error);
        list.innerHTML = "<p>Erro ao carregar serviços do painel.</p>";
      }
    }

    btn.addEventListener("click", async () => {
      const file = document.getElementById("service-image").files[0];
      const titulo = document.getElementById("service-title").value.trim();
      const resumo = document.getElementById("service-summary").value.trim();
      const detalhes = document.getElementById("service-details").value.trim();

      if (!file) {
        showMessage("Escolha uma imagem.", "erro");
        return;
      }

      if (!titulo) {
        showMessage("Preencha o título do serviço.", "erro");
        return;
      }

      btn.disabled = true;

      try {
        showMessage("Enviando imagem...", "ok");

        const imagem = await uploadImage(file);

        showMessage("Salvando serviço...", "ok");

        await addDoc(collection(db, "services"), {
          titulo,
          resumo,
          detalhes,
          imagem,
          createdAt: serverTimestamp()
        });

        showMessage("Serviço publicado com sucesso.", "ok");

        document.getElementById("service-image").value = "";
        document.getElementById("service-title").value = "";
        document.getElementById("service-summary").value = "";
        document.getElementById("service-details").value = "";

        await carregarServicosAdmin();
      } catch (error) {
        console.error("Erro:", error);
        showMessage("Erro ao publicar serviço: " + error.message, "erro");
      } finally {
        btn.disabled = false;
      }
    });

    carregarServicosAdmin();
  </script>
</body>
</html>
